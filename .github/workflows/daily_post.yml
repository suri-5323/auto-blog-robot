# 이 공장의 이름입니다.
name: 매일 아침 8시 블로그 자동화 로봇

on:
  schedule:
    # 매일 한국 시간 아침 8시 (UTC 기준 전날 밤 11시)에 자동으로 작동합니다.
    # cron 설정: 분 시 일 월 요일
    - cron: '0 23 * * *'
  # 필요할 때 사용자가 수동으로 바로 실행할 수도 있게 합니다.
  workflow_dispatch:

jobs:
  post_blog:
    runs-on: ubuntu-latest

    steps:
      # 1. 우리 공장의 코드를 이 로봇 공장으로 가져옵니다 (Checkout).
      - name: 코드를 가져옵니다
        uses: actions/checkout@v4

      # 2. 파이썬을 설치합니다.
      - name: 파이썬 설정 (Set up Python 3.10)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 식단표(requirements.txt)를 보고 필요한 도구들을 설치합니다.
      - name: 필요한 도구들 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 준비한 열쇠들을 공장에 넣어주고, 파이썬 로봇을 작동시킵니다.
      - name: 블로그 자동 포스팅 로봇 작동 (Run Python script)
        env:
          # 친구가 깃허브 비밀 금고(Secrets)에 넣어둔 열쇠를 로봇에게 건네줍니다.
          # 코드의 os.environ.get('GEMINI_API_KEY') 부분으로 전달됩니다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
        run: |
          # 2단계에서 만든 파일 이름을 적어줍니다.
          python blogger_auto_post.py
